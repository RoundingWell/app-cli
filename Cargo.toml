[package]
name = "rw"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "rw"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["json"] }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
base64 = "0.22"
dirs = "5"
open = "5"
jaq-core = "3.0.0"
jaq-std = "3.0.0"
jaq-json = "2.0.0"
