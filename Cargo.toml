[package]
name = "rw"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "rw"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["json"] }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
dirs = "5"
open = "5"
sha2 = "0.10"
base64 = "0.22"
rand = "0.8"
percent-encoding = "2"
