changelog:
  exclude:
    labels:
      - dependency
      - ci
    authors:
      - dependabot[bot]
  categories:
    - title: "⚠️ Breaking Changes"
      labels:
        - breaking
    - title: Features
      labels:
        - feature
    - title: Bug Fixes
      labels:
        - bug
    - title: Documentation
      labels:
        - documentation
    - title: Other Changes
      labels:
        - "*"
